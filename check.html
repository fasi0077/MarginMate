<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            padding: 20px;
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .converter {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 700px;
        }
        input, select, button {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-shadow: 2px 2px 12px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        .currency-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .swap-btn {
            padding: 14px;
            font-size: 22px;
            background: linear-gradient(to right, #ff6a00, #ee0979);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 12px rgba(0, 0, 0, 0.3);
            height: 50px;
            width: 50px;
        }
        .swap-btn:hover {
            transform: rotate(180deg) scale(1.15);
        }
        button {
            background: linear-gradient(to right, #007bff, #00c6ff);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.2s ease;
        }
        button:hover {
            background: linear-gradient(to right, #0056b3, #0096ff);
            transform: scale(1.1);
        }
        @media (max-width: 600px) {
            .converter {
                padding: 30px;
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="converter">
        <h2>Currency Converter</h2>
        <input type="number" id="amount" placeholder="Enter amount">
        <div class="currency-row">
            <select id="fromCurrency">
                <option value="USD">USD - US Dollar</option>
                <option value="EUR">EUR - Euro</option>
                <option value="GBP">GBP - British Pound</option>
                <option value="INR">INR - Indian Rupee</option>
                <option value="JPY">JPY - Japanese Yen</option>
                <option value="AUD">AUD - Australian Dollar</option>
                <option value="CAD">CAD - Canadian Dollar</option>
                <option value="CHF">CHF - Swiss Franc</option>
                <option value="CNY">CNY - Chinese Yuan</option>
                <option value="SGD">SGD - Singapore Dollar</option>
            </select>
            <button class="swap-btn" onclick="swapCurrencies()">⇆</button>
            <select id="toCurrency">
                <option value="INR">INR - Indian Rupee</option>
                <option value="USD">USD - US Dollar</option>
                <option value="EUR">EUR - Euro</option>
                <option value="GBP">GBP - British Pound</option>
                <option value="JPY">JPY - Japanese Yen</option>
                <option value="AUD">AUD - Australian Dollar</option>
                <option value="CAD">CAD - Canadian Dollar</option>
                <option value="CHF">CHF - Swiss Franc</option>
                <option value="CNY">CNY - Chinese Yuan</option>
                <option value="SGD">SGD - Singapore Dollar</option>
            </select>
        </div>
        <button onclick="convertCurrency()">Convert</button>
        <h3 id="result"></h3>
    </div>
    
    <script>
        function swapCurrencies() {
            let fromCurrency = document.getElementById('fromCurrency');
            let toCurrency = document.getElementById('toCurrency');
            let tempValue = fromCurrency.value;
            fromCurrency.value = toCurrency.value;
            toCurrency.value = tempValue;
        }

        async function convertCurrency() {
            let amount = document.getElementById('amount').value;
            let fromCurrency = document.getElementById('fromCurrency').value;
            let toCurrency = document.getElementById('toCurrency').value;
            
            if (amount === "" || amount <= 0) {
                alert("Please enter a valid amount");
                return;
            }
            
            let apiURL = `https://api.exchangerate-api.com/v4/latest/${fromCurrency}`;
            let response = await fetch(apiURL);
            let data = await response.json();
            let exchangeRate = data.rates[toCurrency];
            let convertedAmount = (amount * exchangeRate).toFixed(2);
            
            document.getElementById('result').innerText = `${amount} ${fromCurrency} = ${convertedAmount} ${toCurrency}`;
        }
    </script>
</body>
</html>
